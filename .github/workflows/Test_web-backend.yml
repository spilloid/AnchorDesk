name: Node.js CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:

    runs-on: self-hosted
    container: node:slim

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    - name: Cache node modules
     uses: actions/cache@v4
     with:
       path: web-client/node_modules
       key: ${{ runner.os }}-node-${{ hashFiles('web-client/**/package-lock.json') }}
       restore-keys: |
         ${{ runner.os }}-node-
   - name: Install dependencies
      working-directory: backend
      run: npm install

    - name: Run tests
      run: npm test
