name: anchordesk
services:
  web-client:
    build:
      context: ./web-client
    # nginx prod image (serves built SPA on :80, proxies /api + /mcp to backend)
    ports:
      - "5173:80"
    depends_on:
      - backend
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      # Secrets come from the gitignored .env — never hardcode them here.
      POSTGRES_DB: ${DB_NAME:-anchordesk}
      POSTGRES_USER: ${DB_USER:-mtapp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
    ports:
      - 5432:5432
    volumes:
      - pgdata:/var/lib/postgresql/data:Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mtapp} -d ${DB_NAME:-anchordesk}"]
      interval: 5s
      timeout: 5s
      retries: 10
  adminer:
    image: adminer
    restart: always
    ports:
      - 8081:8080
  backend:
    build:
      context: ./backend
    # Local compose owns schema application; Kubernetes uses its dedicated
    # prisma-db-push initContainer instead.
    command: ["sh", "-c", "npx prisma db push --skip-generate && ./node_modules/.bin/ts-node --transpile-only src/index.ts"]
    ports:
      - 8060:8060
    depends_on:
      db:
        condition: service_healthy
    # backend/.env (volume-mounted) supplies OIDC/TRMM/SMTP; DATABASE_URL is
    # overridden here to reach the db service (not localhost) inside the network.
    environment:
      DATABASE_URL: postgresql://${DB_USER:-mtapp}:${DB_PASSWORD}@db:5432/${DB_NAME:-anchordesk}
    volumes:
      - ./backend:/backend # Mount your project's src folder
      - /backend/node_modules
volumes:
  pgdata:
