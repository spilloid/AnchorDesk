version: "3.8"  # Newer version for added features

services:
  vite-app:
    build:
      context: .
      dockerfile: Dockerfile # Assuming you have a Dockerfile
    ports:
      - "3001:3000" # Map host port 3001 to container's 3000 (Vite default)
    volumes:
      - ./src:/app/src # Mount your project's src folder
      - /app/node_modules # Avoid rebuilding node_modules inside the container
    environment:
      - CHOKIDAR_USEPOLLING=true # Enable file watching on some systems
    command: npm run dev # Start Vite's development server

  tests:
    build:
      context: .
      dockerfile: Dockerfile.test # Dockerfile for your testing environment
    volumes:
      - ./src:/app/src
      - /app/node_modules
    depends_on:
      - vite-app # Ensure vite-app is running before tests
    command: npm test # Or your preferred test command
