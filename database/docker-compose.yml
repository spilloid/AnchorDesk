services:
  db:
    image: mariadb
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: 'Joseph1356'
    ports:
      - 3306:3306
    volumes:
      - mariadb:/var/lib/mysql:Z
  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080
volumes:
  mariadb:
networks:
  default:
      name: "intune-depot-app"
      external: true
