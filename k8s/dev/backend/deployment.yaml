apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: anchordesk
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      initContainers:
        # Wait for Postgres to accept connections before starting the app.
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z db 5432; do
                echo "waiting for db..."; sleep 3
              done
              echo "db is ready"

        # Apply Prisma schema to the database (idempotent).
        - name: prisma-db-push
          image: ghcr.io/spilloid/anchordesk-backend:latest
          imagePullPolicy: Always
          command: ["npx", "prisma", "db", "push", "--skip-generate"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: anchordesk-secrets
                  key: DATABASE_URL

      containers:
        - name: backend
          image: ghcr.io/spilloid/anchordesk-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8060
          env:
            - name: SERVER_PORT
              value: "8060"
            - name: NODE_ENV
              value: development
            - name: TICKET_NUMBER_DIGITS
              value: "5"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: anchordesk-secrets
                  key: DATABASE_URL
            - name: OIDC_DISABLED
              value: "true"   # flip to false and set OIDC_* secrets for real auth
            - name: OIDC_ISSUER_URL
              valueFrom:
                secretKeyRef:
                  name: anchordesk-secrets
                  key: OIDC_ISSUER_URL
                  optional: true
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: anchordesk-secrets
                  key: OIDC_CLIENT_ID
                  optional: true
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: anchordesk-secrets
                  key: OIDC_CLIENT_SECRET
                  optional: true
            # Auth (1.1.0): session signing, public base URL, bootstrap admin, SAML.
            - name: APP_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: anchordesk-secrets
                  key: APP_BASE_URL
                  optional: true
            - name: AUTH_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: anchordesk-secrets
                  key: AUTH_SESSION_SECRET
                  optional: true
            - name: BOOTSTRAP_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: anchordesk-secrets
                  key: BOOTSTRAP_ADMIN_USERNAME
                  optional: true
            - name: BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: anchordesk-secrets
                  key: BOOTSTRAP_ADMIN_PASSWORD
                  optional: true
            - name: SAML_ENTRY_POINT
              valueFrom:
                secretKeyRef:
                  name: anchordesk-secrets
                  key: SAML_ENTRY_POINT
                  optional: true
            - name: SAML_IDP_CERT
              valueFrom:
                secretKeyRef:
                  name: anchordesk-secrets
                  key: SAML_IDP_CERT
                  optional: true
            # Integration values seed the DB on first boot. Non-secrets are
            # inline; SMTP_PASS and TRMM_API_KEY live in the SOPS-managed secret.
            - name: SMTP_HOST
              value: ""
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_SECURE
              value: "false"
            - name: SMTP_USER
              value: ""
            - name: SMTP_FROM
              value: anchordesk@localhost
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: anchordesk-integration-secrets
                  key: SMTP_PASS
                  optional: true
            - name: TRMM_API_URL
              value: https://api.spillerstech.us
            - name: TRMM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: anchordesk-integration-secrets
                  key: TRMM_API_KEY
            - name: CWM_SERVER
              value: ""
            - name: CWM_COMPANY
              value: ""
            - name: CWM_PUBKEY
              value: R5ykLVVHibpkr6zLKWX4agbF
            - name: CWM_PRIVATEKEY
              valueFrom:
                secretKeyRef:
                  name: anchordesk-secrets
                  key: CWM_PRIVATEKEY
                  optional: true
            - name: CWM_CLIENTID
              valueFrom:
                secretKeyRef:
                  name: anchordesk-secrets
                  key: CWM_CLIENTID
                  optional: true
            - name: STORAGE_BACKEND
              value: local
            - name: STORAGE_LOCAL_DIR
              value: ./data/attachments
            - name: S3_ENDPOINT
              value: ""
            - name: S3_REGION
              value: us-east-1
            - name: S3_BUCKET
              value: ""
            - name: S3_ACCESS_KEY_ID
              value: ""
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: anchordesk-secrets
                  key: S3_SECRET_ACCESS_KEY
                  optional: true
            - name: S3_FORCE_PATH_STYLE
              value: "false"
          readinessProbe:
            httpGet:
              path: /ping
              port: 8060
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /ping
              port: 8060
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
